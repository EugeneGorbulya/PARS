# PARS — production-ish single-host deployment.
#   docker compose up -d              -> infra + bot
#   docker compose run --rm migrate   -> apply alembic migrations
#   docker compose run --rm bot \
#     python -m scripts.ingest.fetch_100_flats   -> ad-hoc CLI in the same image
#
# All services share the same image, so any CLI script in `scripts/**` is
# available inside the container with no extra setup.

x-app-env: &app-env
  DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-smartrent}
  REDIS_URL: redis://redis:6379/0
  S3_ENDPOINT: http://minio:9000
  S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
  S3_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin}
  S3_BUCKET: ${S3_BUCKET:-smartrent-media}
  BOT_TOKEN: ${BOT_TOKEN}
  DGIS_API_KEY: ${DGIS_API_KEY}
  CIAN_LIVE: ${CIAN_LIVE:-0}
  CIAN_FETCH_ENABLED: ${CIAN_FETCH_ENABLED:-false}

services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-smartrent}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-smartrent}"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 20

  migrate:
    build: .
    image: pars-app
    profiles: ["tools"]
    depends_on:
      db:
        condition: service_healthy
    environment:
      <<: *app-env
    command: alembic upgrade head

  bot:
    build: .
    image: pars-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      <<: *app-env
    command: python -m bot.main

volumes:
  postgres_data:
  minio_data:
